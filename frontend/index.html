<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AI-Based Facial Authentication System — Secure login with face recognition">
  <title>Login — Facial Auth</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="auth-container">
    <div class="card card-auth">
      <!-- Logo -->
      <div class="logo">
        <div class="logo-icon">🔐</div>
        <span class="logo-text">FaceAuth AI</span>
      </div>

      <h1>Welcome Back</h1>
      <p class="subtitle">Sign in to your account</p>

      <!-- Alert area -->
      <div id="alert-area"></div>

      <!-- Login Form -->
      <form id="login-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-input" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-input" placeholder="Enter your password" required autocomplete="current-password">
        </div>
        <button type="submit" id="login-btn" class="btn btn-primary btn-full">
          Sign In
        </button>
      </form>

      <div class="divider">or</div>

      <!-- Face Login -->
      <button id="face-login-btn" class="btn btn-secondary btn-full" onclick="openFaceLogin()">
        📷 Sign in with Face
      </button>

      <p class="text-center mt-lg text-muted" style="font-size:0.875rem;">
        Don't have an account? <a href="register.html">Create one</a>
      </p>
    </div>
  </div>

  <!-- Face Login Modal -->
  <div id="face-modal" class="modal-overlay" onclick="if(event.target===this)closeFaceModal()">
    <div class="modal">
      <div class="modal-header">
        <h2 style="margin-bottom:0">Face Login</h2>
        <button class="modal-close" onclick="closeFaceModal()">✕</button>
      </div>

      <div class="form-group">
        <label for="face-email">Email (optional — speeds up matching)</label>
        <input type="email" id="face-email" class="form-input" placeholder="you@example.com">
      </div>

      <div class="webcam-container">
        <video id="face-video" autoplay playsinline muted></video>
        <canvas id="face-canvas"></canvas>
        <div class="webcam-overlay"><div class="face-guide"></div></div>
      </div>

      <div id="face-alert"></div>

      <div class="webcam-actions">
        <button class="btn btn-primary btn-full" id="capture-login-btn" onclick="captureFaceLogin()">
          📸 Capture & Login
        </button>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
